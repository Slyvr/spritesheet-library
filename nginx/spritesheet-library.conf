server {
    listen 3005;
    server_name localhost;

    root /home/mushroom/Projects/spritesheet-library/client/build;
    index index.html;

    # Serve spritesheet images directly (faster than proxying)
    location ^~ /spritesheets/ {
        alias /home/mushroom/Projects/spritesheet-library/public/spritesheets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the Node.js backend
    location ^~ /api/ {
        proxy_pass http://localhost:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve the React app (SPA - all routes to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
