server {
    listen 3005;
    server_name localhost;

    root /home/mushroom/Projects/spritesheet-library/client/build;
    index index.html;

    # Serve spritesheet images directly (faster than proxying)
    location ^~ /spritesheets/ {
        alias /home/mushroom/Projects/spritesheet-library/public/spritesheets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the Node.js backend
    location ^~ /api/ {
        client_max_body_size 3m;
        error_page 413 = /api-413.json;
        proxy_pass http://localhost:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # JSON error response for oversized uploads rejected by NGINX
    location = /api-413.json {
        internal;
        default_type application/json;
        return 413 '{"error":"File exceeds the 2 MB size limit."}';
    }

    # Serve the React app (SPA - all routes to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
